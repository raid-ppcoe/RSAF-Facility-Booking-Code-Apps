<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 348.2 155.1" width="100%" height="100%" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
       :root {
    --ease-smooth: cubic-bezier(0.65, 0, 0.35, 1);
    --ease-spring: cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  /* Plane Animation - Total approx 4s */
  .plane-trace {
    stroke: #348bd6;
    stroke-width: 2px;
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    fill: transparent;
    animation: 
      tracePath 4s var(--ease-smooth) forwards,
      fillColor 1.5s ease-in 2.5s forwards;
  }

  /* Text Animation - Staggered to finish with the plane */
  .txt {
    opacity: 0;
    transform: translateY(15px);
    animation: fadeUp 1.2s var(--ease-spring) forwards;
  }
  
  /* Delays scaled to fit the 5s timeline */
  .txt-r { animation-delay: 2.8s; }
  .txt-i { animation-delay: 3s; }
  .txt-d { animation-delay: 3.2s; }

  @keyframes tracePath {
    0% { stroke-dashoffset: 600; }
    100% { stroke-dashoffset: 0; }
  }

  @keyframes fillColor {
    0% { fill: transparent; stroke-width: 2px; }
    100% { fill: #348bd6; stroke-width: 0px; }
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(15px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
  </defs>
